<app-navbar></app-navbar>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Solicitud de Libro</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">

                <label class="form-label">
                    Nombre del lector
                </label>

                <input type="text" class="form-control" [(ngModel)]="nombre" #txtNombre="ngModel" required
                    minlength="10" maxlength="40">
                <small class="text-danger" *ngIf="txtNombre.invalid && txtNombre.touched">

                    Debe ingresar un nombre de al menos 10 caracteres.

                </small>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Libro

                </label>

                <input type="text" class="form-control" [(ngModel)]="libro" #txtLibro="ngModel" required minlength="10" maxlength="50">

                <small class="text-danger" *ngIf="txtLibro.invalid && txtLibro.touched">

                    Debe ingresar un libro.

                </small>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Fecha

                </label>

                <input type="date" class="form-control" [(ngModel)]="fecha" #txtFecha="ngModel" required>

                <small class="text-danger" *ngIf="txtFecha.invalid && txtFecha.touched">

                    Debe seleccionar una fecha.

                </small>

            </div>

            <button class="btn btn-success" (click)="guardar()">

                Guardar Solicitud

            </button>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            Solicitudes Registradas

        </div>

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Libro</th>
                        <th>Fecha</th>
                        <th>Acción</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let solicitud of solicitudes; let i = index">

                        <td>{{ solicitud.nombre }}</td>

                        <td>{{ solicitud.libro }}</td>

                        <td>{{ solicitud.fecha }}</td>

                        <td>

                            <button class="btn btn-danger btn-sm" (click)="eliminar(i)">

                                Eliminar

                            </button>

                        </td>

                    </tr>

                    <tr *ngIf="solicitudes.length === 0">

                        <td colspan="4" class="text-center">

                            No existen solicitudes registradas.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
