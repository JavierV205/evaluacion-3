<app-navbar></app-navbar>

<div class="container">

<div class="card shadow">

<div class="card-body">

<h2>Solicitud de Libro</h2>

<div class="mb-3">

<label>Nombre</label>

<input
class="form-control"
[(ngModel)]="nombre">

</div>

<div class="mb-3">

<label>Libro</label>

<input
class="form-control"
[(ngModel)]="libro">

</div>

<div class="mb-3">

<label>Fecha</label>

<input
type="date"
class="form-control"
[(ngModel)]="fecha">

</div>

<button
class="btn btn-success"
(click)="guardar()">

Guardar

</button>

</div>

</div>

<br>

<table class="table table-striped">

<thead>

<tr>

<th>Nombre</th>

<th>Libro</th>

<th>Fecha</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let s of solicitudes">

<td>{{s.nombre}}</td>

<td>{{s.libro}}</td>

<td>{{s.fecha}}</td>

</tr>

</tbody>

</table>

</div>
